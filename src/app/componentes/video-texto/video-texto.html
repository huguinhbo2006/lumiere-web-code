<section class="video-texto-section py-5" style="position: relative;">
    <div class="container">
        <div class="row align-items-center" [class.flex-row-reverse]="props.videoDerecha">
            
            <!-- Columna del Video -->
            <div class="col-12 col-md-6 mb-4 mb-md-0">
                <div class="video-container shadow-lg rounded-4 overflow-hidden bg-dark position-relative">
                    <div class="ratio ratio-16x9" *ngIf="safeUrl">
                        <iframe [src]="safeUrl" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                    </div>
                    <div class="ratio ratio-16x9 d-flex flex-column align-items-center justify-content-center text-white p-4 text-center" *ngIf="!safeUrl">
                        <i class="bi bi-youtube text-danger fs-1 mb-2"></i>
                        <p class="m-0">No se ha configurado un video válido</p>
                    </div>
                </div>
            </div>

            <!-- Columna del Texto -->
            <div class="col-12 col-md-6 px-lg-5">
                <div class="text-content">
                    <h2 class="fw-bold mb-3 section-title">{{ props.titulo }}</h2>
                    <p class="text-muted mb-4 section-desc">{{ props.descripcion }}</p>
                    
                    <a *ngIf="props.botonTexto" [href]="props.botonEnlace || '#'" class="btn btn-primary btn-cta px-4 py-2.5 fw-bold rounded-3">
                        {{ props.botonTexto }}
                    </a>
                </div>
            </div>

        </div>
    </div>
</section>
